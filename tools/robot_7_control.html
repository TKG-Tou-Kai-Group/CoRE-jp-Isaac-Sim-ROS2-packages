<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>Robot Control</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/roslibjs/0.20.0/roslib.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #1a1a1a; color: #eee; font-family: sans-serif; overflow: hidden; }

  #videoStream {
    width: 100%; height: auto; display: block; cursor: pointer;
    background: #000;
  }

  /* ステータスバー */
  #status-bar {
    display: flex; justify-content: space-between; align-items: center;
    padding: 4px 12px; background: #222; font-size: 13px; gap: 16px;
  }
  #status-bar span { white-space: nowrap; }
  .status-ok { color: #4c4; } .status-ng { color: #c44; } .status-warn { color: #ca4; }

  /* 設定パネル */
  #config-toggle {
    position: fixed; top: 8px; right: 8px; z-index: 100;
    background: rgba(0,0,0,0.6); color: #eee; border: 1px solid #555;
    padding: 6px 12px; cursor: pointer; border-radius: 4px; font-size: 13px;
  }
  #config-toggle:hover { background: rgba(60,60,60,0.8); }

  #config-panel {
    display: none; position: fixed; top: 0; right: 0; z-index: 200;
    width: 380px; height: 100vh; background: #252525; border-left: 2px solid #444;
    overflow-y: auto; padding: 16px; font-size: 13px;
  }
  #config-panel.open { display: block; }
  #config-panel h3 { margin: 16px 0 8px; color: #aaa; font-size: 14px; border-bottom: 1px solid #444; padding-bottom: 4px; }
  #config-panel h3:first-child { margin-top: 0; }

  .config-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 4px 0;
  }
  .config-row label { flex: 1; }
  .config-row .bind-btn {
    min-width: 100px; padding: 4px 8px; text-align: center;
    background: #333; color: #eee; border: 1px solid #555;
    cursor: pointer; border-radius: 3px; font-size: 13px;
  }
  .config-row .bind-btn:hover { background: #444; }
  .config-row .bind-btn.waiting { background: #553; border-color: #aa4; color: #ff4; }

  .config-buttons { margin-top: 16px; display: flex; gap: 8px; }
  .config-buttons button {
    flex: 1; padding: 8px; cursor: pointer; border-radius: 4px;
    font-size: 13px; border: 1px solid #555;
  }
  .btn-reset { background: #533; color: #eee; }
  .btn-reset:hover { background: #644; }
  .btn-close { background: #335; color: #eee; }
  .btn-close:hover { background: #446; }

  /* 入力状態表示 */
  #input-display {
    position: fixed; bottom: 8px; right: 8px; z-index: 90;
    background: rgba(0,0,0,0.7); border-radius: 8px; padding: 12px;
  }
  .stick-container { display: inline-block; width: 64px; height: 64px; position: relative; margin: 0 8px; vertical-align: top; }
  .stick-bg { width: 64px; height: 64px; border: 1px solid #555; border-radius: 50%; position: absolute; }
  .stick-dot {
    width: 16px; height: 16px; background: #4c4; border-radius: 50%;
    position: absolute; top: 24px; left: 24px;
    transition: top 0.05s, left 0.05s;
  }
  .stick-label { text-align: center; font-size: 10px; color: #888; margin-top: 2px; }
  .btn-indicators { display: flex; gap: 4px; margin-top: 8px; justify-content: center; }
  .btn-ind {
    width: 20px; height: 20px; border: 1px solid #555; border-radius: 3px;
    display: flex; align-items: center; justify-content: center;
    font-size: 9px; color: #888;
  }
  .btn-ind.active { background: #4c4; color: #000; border-color: #4c4; }

  /* ゲームパッド設定 */
  .deadzone-row { display: flex; align-items: center; gap: 8px; padding: 4px 0; }
  .deadzone-row input[type=range] { flex: 1; }
</style>
</head>

<body>
  <img id="videoStream" alt="Connecting..." />

  <div id="status-bar">
    <span>Connection: <span id="status" class="status-ng">N/A</span></span>
    <span>Video: <span id="video-status" class="status-ng">N/A</span></span>
    <span>Speed: <span id="scale-factor">1.0</span></span>
    <span>Input: <span id="input-mode">Keyboard</span></span>
  </div>

  <button id="config-toggle" onclick="toggleConfig()">Settings</button>

  <div id="config-panel">
    <h3>Keyboard</h3>
    <div id="kb-config"></div>
    <h3>Gamepad</h3>
    <div id="gp-config"></div>
    <h3>Gamepad Deadzone</h3>
    <div class="deadzone-row">
      <label>Deadzone:</label>
      <input type="range" id="deadzone-slider" min="0.05" max="0.5" step="0.05" value="0.3"
        oninput="updateDeadzone(this.value)" />
      <span id="deadzone-val">0.30</span>
    </div>
    <div class="config-buttons">
      <button class="btn-reset" onclick="resetConfig()">Reset to Default</button>
      <button class="btn-close" onclick="toggleConfig()">Close</button>
    </div>
  </div>

  <div id="input-display">
    <div style="display: flex; align-items: flex-start;">
      <div>
        <div class="stick-container">
          <div class="stick-bg"></div>
          <div class="stick-dot" id="left-dot"></div>
        </div>
        <div class="stick-label">L Stick</div>
      </div>
      <div>
        <div class="stick-container">
          <div class="stick-bg"></div>
          <div class="stick-dot" id="right-dot"></div>
        </div>
        <div class="stick-label">R Stick</div>
      </div>
    </div>
    <div class="btn-indicators">
      <div class="btn-ind" id="ind-btn4">View</div>
      <div class="btn-ind" id="ind-btn5">Shoot</div>
      <div class="btn-ind" id="ind-btn8">Turbo</div>
      <div class="btn-ind" id="ind-btn9">Reset</div>
    </div>
  </div>

<script>
  // ===== 設定 =====
  const ROBOT_NAME = 'sample_robot_7';
  const SERVER_ADDRESS = 'localhost';
  const SERVER_PORT = '9090';
  const STORAGE_KEY = 'robot_control_config_' + ROBOT_NAME;

  // キーボードアクション定義
  const KB_ACTIONS = [
    { id: 'leftStickUp',    label: 'L-Stick Up' },
    { id: 'leftStickDown',  label: 'L-Stick Down' },
    { id: 'leftStickLeft',  label: 'L-Stick Left' },
    { id: 'leftStickRight', label: 'L-Stick Right' },
    { id: 'rightStickUp',   label: 'R-Stick Up' },
    { id: 'rightStickDown', label: 'R-Stick Down' },
    { id: 'rightStickLeft', label: 'R-Stick Left' },
    { id: 'rightStickRight',label: 'R-Stick Right' },
    { id: 'shoot',          label: 'Shoot (btn5)' },
    { id: 'turbo',          label: 'Turbo (btn8)' },
    { id: 'topView',        label: 'Top View (btn4)' },
    { id: 'reset',          label: 'Reset (btn9)' },
    { id: 'speedUp',        label: 'Speed Up' },
    { id: 'speedDown',      label: 'Speed Down' },
  ];

  const GP_ACTIONS = [
    { id: 'speedUp',   label: 'Speed Up' },
    { id: 'speedDown', label: 'Speed Down' },
  ];

  const DEFAULT_CONFIG = {
    keyboard: {
      leftStickUp: 'ArrowUp', leftStickDown: 'ArrowDown',
      leftStickLeft: 'ArrowLeft', leftStickRight: 'ArrowRight',
      rightStickUp: 'w', rightStickDown: 's',
      rightStickLeft: 'a', rightStickRight: 'd',
      shoot: ' ', turbo: 'Shift', topView: 'v', reset: 'r',
      speedUp: 'PageUp', speedDown: 'PageDown',
    },
    gamepad: {
      speedUp: 12, speedDown: 13, deadzone: 0.3,
    }
  };

  // 設定の読み込み
  let config = loadConfig();

  function loadConfig() {
    try {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (saved) {
        const parsed = JSON.parse(saved);
        return { keyboard: { ...DEFAULT_CONFIG.keyboard, ...parsed.keyboard },
                 gamepad: { ...DEFAULT_CONFIG.gamepad, ...parsed.gamepad } };
      }
    } catch(e) {}
    return JSON.parse(JSON.stringify(DEFAULT_CONFIG));
  }

  function saveConfig() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(config));
  }

  function resetConfig() {
    config = JSON.parse(JSON.stringify(DEFAULT_CONFIG));
    saveConfig();
    renderConfigUI();
    document.getElementById('deadzone-slider').value = config.gamepad.deadzone;
    document.getElementById('deadzone-val').textContent = config.gamepad.deadzone.toFixed(2);
  }

  // ===== キー表示名 =====
  function keyDisplayName(key) {
    const names = {
      ' ': 'Space', 'ArrowUp': '↑', 'ArrowDown': '↓',
      'ArrowLeft': '←', 'ArrowRight': '→',
      'PageUp': 'PgUp', 'PageDown': 'PgDn',
      'Enter': 'Enter', 'Shift': 'Shift', 'Control': 'Ctrl', 'Alt': 'Alt',
      'Tab': 'Tab', 'Backspace': 'BS', 'Delete': 'Del',
    };
    if (!key) return '(none)';
    return names[key] || (key.length === 1 ? key.toUpperCase() : key);
  }

  function buttonDisplayName(btn) {
    const names = {
      0:'A', 1:'B', 2:'X', 3:'Y', 4:'LB', 5:'RB', 6:'LT', 7:'RT',
      8:'Back', 9:'Start', 10:'L3', 11:'R3',
      12:'D-Up', 13:'D-Down', 14:'D-Left', 15:'D-Right',
    };
    return names[btn] || ('Btn' + btn);
  }

  // ===== リマップ =====
  let remapState = null; // { type: 'keyboard'|'gamepad', actionId: string }

  function startRemap(type, actionId, btnElement) {
    // 既にリマップ中なら前のをキャンセル
    cancelRemap();
    remapState = { type, actionId, btnElement };
    btnElement.classList.add('waiting');
    if (type === 'keyboard') {
      btnElement.textContent = 'Press key...';
    } else {
      btnElement.textContent = 'Press btn...';
      requestAnimationFrame(pollGamepadForRemap);
    }
  }

  function cancelRemap() {
    if (remapState) {
      remapState.btnElement.classList.remove('waiting');
      renderConfigUI();
      remapState = null;
    }
  }

  function pollGamepadForRemap() {
    if (!remapState || remapState.type !== 'gamepad') return;
    const gamepads = navigator.getGamepads();
    for (const gp of gamepads) {
      if (!gp) continue;
      for (let i = 0; i < gp.buttons.length; i++) {
        if (gp.buttons[i].pressed) {
          config.gamepad[remapState.actionId] = i;
          saveConfig();
          cancelRemap();
          return;
        }
      }
    }
    requestAnimationFrame(pollGamepadForRemap);
  }

  // ===== 設定UI描画 =====
  function renderConfigUI() {
    // キーボード設定
    const kbDiv = document.getElementById('kb-config');
    kbDiv.innerHTML = '';
    for (const action of KB_ACTIONS) {
      const row = document.createElement('div');
      row.className = 'config-row';
      const label = document.createElement('label');
      label.textContent = action.label;
      const btn = document.createElement('button');
      btn.className = 'bind-btn';
      btn.textContent = keyDisplayName(config.keyboard[action.id]);
      btn.onclick = () => startRemap('keyboard', action.id, btn);
      row.appendChild(label);
      row.appendChild(btn);
      kbDiv.appendChild(row);
    }

    // ゲームパッド設定
    const gpDiv = document.getElementById('gp-config');
    gpDiv.innerHTML = '';
    for (const action of GP_ACTIONS) {
      const row = document.createElement('div');
      row.className = 'config-row';
      const label = document.createElement('label');
      label.textContent = action.label;
      const btn = document.createElement('button');
      btn.className = 'bind-btn';
      btn.textContent = buttonDisplayName(config.gamepad[action.id]);
      btn.onclick = () => startRemap('gamepad', action.id, btn);
      row.appendChild(label);
      row.appendChild(btn);
      gpDiv.appendChild(row);
    }
  }

  function toggleConfig() {
    document.getElementById('config-panel').classList.toggle('open');
  }

  function updateDeadzone(val) {
    config.gamepad.deadzone = parseFloat(val);
    document.getElementById('deadzone-val').textContent = parseFloat(val).toFixed(2);
    saveConfig();
  }

  // 初期描画
  renderConfigUI();
  document.getElementById('deadzone-slider').value = config.gamepad.deadzone;
  document.getElementById('deadzone-val').textContent = config.gamepad.deadzone.toFixed(2);

  // ===== ROS接続 =====
  const videoStream = document.getElementById('videoStream');
  let scaleFactor = 0.5;

  const ros = new ROSLIB.Ros({
    url: `ws://${SERVER_ADDRESS}:${SERVER_PORT}`,
    options: { ros_domain_id: '89' }
  });

  ros.on("connection", () => {
    document.getElementById("status").textContent = "Connected";
    document.getElementById("status").className = "status-ok";
    document.getElementById('video-status').textContent = 'Subscribing...';
    document.getElementById('video-status').className = 'status-warn';

    const imageTopic = new ROSLIB.Topic({
      ros, name: `/${ROBOT_NAME}/base_link/camera_link/image_compressed`,
      messageType: 'sensor_msgs/CompressedImage'
    });
    imageTopic.subscribe((msg) => {
      videoStream.src = 'data:image/jpeg;base64,' + msg.data;
      document.getElementById('video-status').textContent = 'Streaming';
      document.getElementById('video-status').className = 'status-ok';
    });
  });

  ros.on('error', () => {
    document.getElementById("status").textContent = "Error";
    document.getElementById("status").className = "status-ng";
  });

  ros.on('close', () => {
    document.getElementById("status").textContent = "Disconnected";
    document.getElementById("status").className = "status-ng";
    document.getElementById('video-status').textContent = 'N/A';
    document.getElementById('video-status').className = 'status-ng';
  });

  const joyTopic = new ROSLIB.Topic({
    ros, name: `/${ROBOT_NAME}/joy`, messageType: 'sensor_msgs/Joy'
  });

  // ===== 入力状態表示 =====
  function updateInputDisplay(axes, buttons) {
    // 左スティック
    const ld = document.getElementById('left-dot');
    ld.style.left = (24 + axes[0] * 24) + 'px';
    ld.style.top  = (24 + axes[1] * 24) + 'px';
    // 右スティック
    const rd = document.getElementById('right-dot');
    rd.style.left = (24 + axes[2] * 24) + 'px';
    rd.style.top  = (24 + axes[3] * 24) + 'px';
    // ボタン
    document.getElementById('ind-btn4').classList.toggle('active', buttons[4] === 1);
    document.getElementById('ind-btn5').classList.toggle('active', buttons[5] === 1);
    document.getElementById('ind-btn8').classList.toggle('active', buttons[8] === 1);
    document.getElementById('ind-btn9').classList.toggle('active', buttons[9] === 1);
  }

  // ===== キーボード入力 =====
  const heldKeys = new Set();
  let virtualGamepad = { axes: [0,0,0,0,0,0], buttons: Array(18).fill(0) };

  function updateFromKeyboard() {
    const kb = config.keyboard;
    virtualGamepad.axes[0] = (heldKeys.has(kb.leftStickRight) ? 1 : 0) - (heldKeys.has(kb.leftStickLeft) ? 1 : 0);
    virtualGamepad.axes[1] = (heldKeys.has(kb.leftStickDown)  ? 1 : 0) - (heldKeys.has(kb.leftStickUp)   ? 1 : 0);
    virtualGamepad.axes[2] = (heldKeys.has(kb.rightStickRight)? 1 : 0) - (heldKeys.has(kb.rightStickLeft) ? 1 : 0);
    virtualGamepad.axes[3] = (heldKeys.has(kb.rightStickDown) ? 1 : 0) - (heldKeys.has(kb.rightStickUp)   ? 1 : 0);

    virtualGamepad.buttons[4] = heldKeys.has(kb.topView) ? 1 : 0;  // 俯瞰画像ON/OFF
    virtualGamepad.buttons[5] = heldKeys.has(kb.shoot) ? 1 : 0;   // 射撃 (shoot_button: 5)
    virtualGamepad.buttons[8] = heldKeys.has(kb.turbo) ? 1 : 0;   // ターボモード
    virtualGamepad.buttons[9] = heldKeys.has(kb.reset) ? 1 : 0;   // リセット

    publishJoy(virtualGamepad.axes, virtualGamepad.buttons);
    document.getElementById('input-mode').textContent = 'Keyboard';
  }

  function publishJoy(axes, buttons) {
    const joyMessage = new ROSLIB.Message({
      header: {
        stamp: { secs: Math.floor(Date.now()/1000), nsecs: (Date.now()%1000)*1000000 },
        frame_id: ''
      },
      axes, buttons
    });
    joyTopic.publish(joyMessage);
    updateInputDisplay(axes, buttons);
  }

  window.addEventListener('keydown', (e) => {
    // リマップ中
    if (remapState && remapState.type === 'keyboard') {
      if (e.key === 'Escape') { cancelRemap(); return; }
      config.keyboard[remapState.actionId] = e.key;
      saveConfig();
      cancelRemap();
      return;
    }
    // Escでリマップキャンセル（ゲームパッドリマップ中）
    if (remapState && e.key === 'Escape') { cancelRemap(); return; }

    // 設定パネルが開いている間は入力を無視
    if (document.getElementById('config-panel').classList.contains('open')) return;

    // バインドされたキーのデフォルト動作を防止（F5リロード等）
    const allBoundKeys = Object.values(config.keyboard);
    if (allBoundKeys.includes(e.key)) { e.preventDefault(); }

    const kb = config.keyboard;
    // 速度調整
    if (e.key === kb.speedUp) {
      scaleFactor = Math.min(1, scaleFactor + 0.05);
      document.getElementById('scale-factor').textContent = (scaleFactor * 2).toFixed(1);
      return;
    }
    if (e.key === kb.speedDown) {
      scaleFactor = Math.max(0.05, scaleFactor - 0.05);
      document.getElementById('scale-factor').textContent = (scaleFactor * 2).toFixed(1);
      return;
    }

    if (!heldKeys.has(e.key)) {
      heldKeys.add(e.key);
      updateFromKeyboard();
    }
  });

  window.addEventListener('keyup', (e) => {
    if (document.getElementById('config-panel').classList.contains('open')) return;
    if (heldKeys.has(e.key)) {
      heldKeys.delete(e.key);
      updateFromKeyboard();
    }
  });

  // フォーカスを失ったとき全キーリリース
  window.addEventListener('blur', () => {
    heldKeys.clear();
    updateFromKeyboard();
  });

  // ===== ゲームパッド入力 =====
  let gamepadConnected = false;

  function updateGamepadStatus() {
    const gamepads = navigator.getGamepads();
    for (const gp of gamepads) {
      if (!gp) continue;

      const dz = config.gamepad.deadzone;
      const axes = gp.axes.map(a => Math.abs(a) <= dz ? 0 : a * scaleFactor);
      const buttons = gp.buttons.map(b => b.value);

      // 速度調整
      if (gp.buttons[config.gamepad.speedUp] && gp.buttons[config.gamepad.speedUp].pressed) {
        if (!crossKeyPressed) {
          scaleFactor = Math.min(1, scaleFactor + 0.05);
          crossKeyPressed = true;
        }
      } else if (gp.buttons[config.gamepad.speedDown] && gp.buttons[config.gamepad.speedDown].pressed) {
        if (!crossKeyPressed) {
          scaleFactor = Math.max(0.05, scaleFactor - 0.05);
          crossKeyPressed = true;
        }
      } else {
        crossKeyPressed = false;
      }

      document.getElementById('scale-factor').textContent = (scaleFactor * 2).toFixed(1);
      document.getElementById('input-mode').textContent = 'Gamepad';
      publishJoy(axes, buttons);
      break; // 最初のゲームパッドのみ使用
    }
    requestAnimationFrame(updateGamepadStatus);
  }

  let crossKeyPressed = false;
  window.addEventListener("gamepadconnected", () => {
    gamepadConnected = true;
    updateGamepadStatus();
  });

  // ===== フルスクリーン =====
  videoStream.addEventListener('dblclick', () => {
    if (document.fullscreenElement) {
      document.exitFullscreen();
    } else {
      document.documentElement.requestFullscreen();
    }
  });

  // 初期速度表示
  document.getElementById('scale-factor').textContent = (scaleFactor * 2).toFixed(1);
</script>
</body>
</html>
